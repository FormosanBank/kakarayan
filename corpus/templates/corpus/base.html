{% load i18n static %}{% get_current_language as CURRENT_LANG %}<!DOCTYPE html>
<html lang="{{ CURRENT_LANG }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kakarayan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'corpus/css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'corpus/css/components.css' %}">
  <script src="{% static 'corpus/js/htmx.min.js' %}" defer></script>
  {% block extra_head %}{% endblock %}
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

<div id="htmx-indicator"></div>

<header class="kk-topbar">
  <a href="{% url 'dictionary' %}" class="kk-topbar__brand">
    <span class="kk-topbar__wordmark">Kakarayan</span>
    <span class="kk-topbar__beta">Beta</span>
  </a>
  <div class="kk-topbar__actions">
    <div class="kk-lang-switcher">
      <form action="{% url 'set_language' %}" method="post" id="lang-switcher-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <select name="language" onchange="document.getElementById('lang-switcher-form').submit()" aria-label="{% trans 'Interface language' %}">
          {% get_current_language as CURRENT_LANGUAGE %}
          {% get_available_languages as LANGUAGES %}
          {% for lang_code, lang_name in LANGUAGES %}
            <option value="{{ lang_code }}"{% if lang_code == CURRENT_LANGUAGE %} selected{% endif %}>{{ lang_name }}</option>
          {% endfor %}
        </select>
      </form>
    </div>
  </div>
</header>

<div class="kk-page">
  {% block content %}{% endblock %}
</div>

</body>
</html>
